<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>N-gram Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Backoff N-gram Generator</h1>

    <textarea id="inputText" placeholder="Start typing a sentence (optional)..."></textarea>

    <div class="buttons">
      <button onclick="generateFromInput()">Continue Sentence</button>
      <button onclick="generateRandom()">Generate Random</button>
    </div>

    <div class="output">
      <h3>Result:</h3>
      <p id="result">---</p>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
