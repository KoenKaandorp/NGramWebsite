<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N-Gram Oracle</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="scanlines"></div>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-orb orb-c"></div>
  <div class="grid-glow"></div>

  <main class="app">
    <section class="hero">
      <p class="eyebrow">Experimental Text Synthesis Interface</p>
      <h1>N-Gram <span>Oracle</span></h1>
      <p class="hero-subtitle">
        Begin a sentence and let the model continue it, one word at a time.
      </p>
    </section>

    <section class="composer glass">
      <div class="composer-top">
        <p class="composer-label">Write something...</p>
        <button class="ghost-btn" onclick="clearText()">Clear</button>
      </div>

      <div class="textarea-shell">
        <textarea
          id="inputText"
          placeholder="e.g. the city was silent until..."
        ></textarea>
      </div>

      <div class="button-row">
        <button class="mega-btn primary" onclick="generateFromInput()">
          <span class="btn-title">Continue Sentence</span>
          <span class="btn-sub">Let the oracle finish your thought</span>
        </button>

        <button class="mega-btn secondary" onclick="generateRandom()">
          <span class="btn-title">Generate Random</span>
          <span class="btn-sub">Start from nothing</span>
        </button>
      </div>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
