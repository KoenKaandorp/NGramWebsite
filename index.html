<!-- ================= index.html ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chronicles Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">

    <header class="header">
      <h1>Chronicles</h1>
      <p>Generate text using your n-gram model</p>
    </header>

    <main class="layout">

      <section class="editor">
        <div class="editor-top">
          <span>Your text</span>
          <button class="ghost" onclick="clearText()">Clear</button>
        </div>

        <textarea id="inputText" placeholder="Start writing or generate..."></textarea>

        <div id="depthViz" class="depth-viz"></div>
      </section>

      <aside class="controls-panel">
        <button class="primary" onclick="generateFromInput()">
          Continue
        </button>

        <button class="secondary" onclick="generateRandom()">
          Random
        </button>

        <div id="loadingOverlay" class="loading-overlay hidden">
          <div class="spinner"></div>
          <span>Generating...</span>
        </div>
      </aside>

    </main>

  </div>

  <script src="scripts.js"></script>
</body>
</html>
