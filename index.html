<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chronicles of Middle-earth</title>

  <link rel="stylesheet" href="styles.css"/>

  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
</head>

<body>
  <div class="map-background"></div>
  <div class="vignette"></div>

  <main class="container">

    <header class="header">
      <h1>Chronicles of Middle-earth</h1>
      <p class="subtitle">
        A linguistic relic woven from the words of the Three Ages
      </p>
    </header>

    <section class="panel">
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="great-eye"></div>
        <p>The Lore is shifting...</p>
      </div>

      <div class="panel-header">
        <h2>Your Passage</h2>
        <button class="btn subtle" onclick="clearText()">Purge Ink</button>
      </div>

      <textarea
        id="inputText"
        placeholder="Begin your tale... (e.g. 'In a hole in the ground...')"
      ></textarea>

      <div class="controls">
        <button class="btn primary wax-seal" onclick="generateFromInput()">
          <span>Continue the Tale</span>
        </button>

        <button class="btn secondary" onclick="generateRandom()">
          <span>Random Passage</span>
        </button>
      </div>

    </section>

    <footer class="footer">
      <p>
        Forged from the texts of The Fellowship, The Two Towers, and The Return of the King
      </p>
    </footer>

  </main>

  <script src="scripts.js"></script>
</body>
</html>
